version: '3.8'
services:
  db:
    image: postgres:15
    container_name: bigdata_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=pet_shop_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./source_data:/data 

volumes:
  postgres_data:
